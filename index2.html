<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me? ❤️</title>
    <style>
        body {margin:0;padding:0;background:linear-gradient(#ffe4e1,#ff69b4);font-family:'Comic Sans MS',cursive;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}
        .container {width:380px;height:520px;background:white;border-radius:25px;box-shadow:0 15px 35px rgba(255,105,180,0.3);position:relative;overflow:hidden;}
        .question-container,.result-container {position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.5s;}
        .result-container {display:none;}
        img {width:220px;height:220px;margin-bottom:20px;border-radius:20px;}
        h2 {color:#ff1493;font-size:28px;margin:10px 0;}
        .button-container {display:flex;gap:25px;}
        button {padding:15px 35px;font-size:22px;border:none;border-radius:50px;cursor:pointer;transition:all 0.3s;}
        .yes-btn {background:#ff1493;color:white;}
        .no-btn {background:#ddd;color:#333;}
        .no-btn:active {transform:scale(0.8);}
    </style>
</head>
<body>

<div class="container">
    <!-- QUESTION PART - Bubu & Dudu asking -->
    <div class="question-container" id="question">
        <img src="https://media.tenor.com/cVzKULzKpVgAAAAm/bubu-dudu-images-bubu-dudu-love.webp" id="askGif" alt="Do you love me?">
        <h2>Do you love me?</h2>
        <div class="button-container">
            <button class="yes-btn" id="yesBtn">No🥺</button>
        </div>
    </div>

    <!-- RESULT PART - Super cute love reaction -->
    <div class="result-container" id="result">
        <img src="https://media.tenor.com/PXKZhCEfEfsAAAAm/bubu-bubu-dudu.webp" id="loveGif" alt="I knew it!">
        <h2>Nah i know you love me, iloveyoumore "from your buloyagon na uyab:kurt"</h2>
    </div>
</div>

<script>
    const yesBtn = document.getElementById('yesBtn');
    const questionDiv = document.getElementById('question');
    const resultDiv = document.getElementById('result');

    yesBtn.addEventListener('click', () => {
        questionDiv.style.display = 'none';
        resultDiv.style.display = 'flex';
    });
</script>

</body>
</html>
